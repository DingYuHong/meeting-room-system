version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: meeting-room-db
    environment:
      POSTGRES_DB: meetingroom
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d meetingroom"]
      interval: 10s
      timeout: 5s
      retries: 5

  webapp:
    build: .
    container_name: meeting-room-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/meetingroom
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
